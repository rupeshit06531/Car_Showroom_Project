{% extends 'showroom/base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">➕ Add New Sale</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">
            Save Sale
        </button>

        <a href="/sales/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
