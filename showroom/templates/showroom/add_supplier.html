{% extends "showroom/base.html" %}

{% block content %}

<h2 class="mb-4">➕ Add Supplier</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Save Supplier
    </button>

    <a href="{% url 'supplier_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
