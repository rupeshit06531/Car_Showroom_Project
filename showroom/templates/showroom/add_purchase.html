{% extends "showroom/base.html" %}

{% block content %}

<h2 class="mb-4">➕ Add Purchase</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Save Purchase
    </button>

    <a href="{% url 'purchase_list' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
