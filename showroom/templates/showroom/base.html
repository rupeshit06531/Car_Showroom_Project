<!DOCTYPE html>
<html>
<head>
    <title>Car Showroom Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="ms-auto">

{% if user.is_authenticated %}

<span class="text-white me-3">

Welcome,
<strong>{{ user.username }}</strong>

</span>

<a href="/logout/" class="btn btn-danger">
Logout
</a>

{% else %}

<a href="/login/" class="btn btn-success">
Login
</a>

{% endif %}

</div>

<div class="container">

<a class="navbar-brand" href="/">🚗 Car Showroom</a>

<div class="navbar-nav">

<a class="nav-link" href="/">Home</a>

<a class="nav-link" href="/add-car/">Add Car</a>

<a class="nav-link" href="/customers/">Customers</a>

<a class="nav-link" href="/sales/">Sales</a>

<a href="/" class="btn btn-primary">Home</a>

<a href="/customers/" class="btn btn-success">Customers</a>

<a href="/sales/" class="btn btn-warning">Sales</a>

<a href="/add-sale/" class="btn btn-danger">Add Sale</a>

<a class="btn btn-outline-light ms-2" href="/login/">Login</a>

<a class="btn btn-danger ms-2" href="/logout/">Logout</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
